<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relova Virtual Try-On</title>

<link rel="stylesheet" href="style.css">

<style>

/* LAYOUT */
.tryon-wrapper {
  padding: 50px;
}

/* HEADER */
.tryon-header {
  text-align: center;
  margin-bottom: 40px;
}

.tryon-header h1 {
  font-size: 36px;
}

.tryon-header span {
  color: #2d6a4f;
}

/* MAIN GRID */
.tryon-main {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 30px;
}

/* CARD */
.box {
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* MODEL */
.model-box {
  position: relative;
  width: 100%;
  height: 420px;
  border-radius: 20px;
  overflow: hidden;
  background: #eee;
}

.model-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CLOTHES */
.clothes {
  position: absolute;
  top: 90px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  opacity: 0.95;
  transition: 0.3s;
}

/* WARDROBE */
.wardrobe {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
}

.wardrobe img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.wardrobe img:hover {
  transform: scale(1.1);
}

/* BUTTON */
.btn {
  background: #2d6a4f;
  color: white;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

/* SLIDER */
.slider {
  width: 100%;
}

/* RESPONSIVE */
@media(max-width:900px){
  .tryon-main {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">
    <img src="images/logo.jpg">
    <h2>Relova</h2>
  </div>

  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="marketplace.html">Marketplace</a></li>
    <li><a href="tryon.html">Try-On</a></li>
    <li><a href="kamipeduli.html">Kami Peduli</a></li>
    <li><a href="circulardrop.html">Circular Drop</a></li>
    <li><a href="reward.html">Reward</a></li>
    <li><a href="premium.html">Premium</a></li>
  </ul>
</nav>

<!-- HEADER -->
<div class="tryon-wrapper">

  <div class="tryon-header">
    <h1>Virtual <span>Try-On</span> Experience 👗</h1>
    <p>Coba pakaian langsung di tubuhmu dengan teknologi digital fitting</p>
  </div>

  <div class="tryon-main">

    <!-- UPLOAD -->
    <div class="box">
      <h3>Upload Foto</h3>
      <input type="file" id="upload">
      <button class="btn" onclick="resetClothes()">Reset Outfit</button>
    </div>

    <!-- MODEL -->
    <div class="box">
      <h3>Preview</h3>

      <div class="model-box">
        <img id="userImage" src="https://i.imgur.com/6VBx3io.png">
        <img id="clothes" class="clothes" src="">
      </div>

      <p>Geser untuk atur ukuran:</p>
      <input type="range" min="100" max="300" value="220" class="slider" id="sizeSlider">

    </div>

    <!-- WARDROBE -->
    <div class="box">
      <h3>Wardrobe Kamu</h3>

      <div class="wardrobe">
        <img src="https://dynamic.zacdn.com/Lk26EmB4rl01bNMuxZorrfrx4mQ=/0x440/filters:quality(70):format(webp)/https://static-id.zacdn.com/p/marks-spencer-1941-8622415-1.jpg" onclick="changeClothes(this.src)">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJaqheabED9yWEzBwveu1DhYqJwh0RLTABkA&s" onclick="changeClothes(this.src)">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTA_sLK3WM195JuMOsmvaqquLRmDB1RHrYvBg&s" onclick="changeClothes(this.src)">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFvWzknkCSAiyEVhJe9vGjcvTTP4gJA7Bdhg&s" onclick="changeClothes(this.src)">
      </div>

    </div>

  </div>

</div>

<script>

/* UPLOAD FOTO */
document.getElementById("upload").addEventListener("change", function(e){
  const reader = new FileReader();
  reader.onload = function(){
    document.getElementById("userImage").src = reader.result;
  }
  reader.readAsDataURL(e.target.files[0]);
});

/* GANTI BAJU */
function changeClothes(src){
  document.getElementById("clothes").src = src;
}

/* RESET */
function resetClothes(){
  document.getElementById("clothes").src = "";
}

/* RESIZE BAJU */
document.getElementById("sizeSlider").addEventListener("input", function(){
  document.getElementById("clothes").style.width = this.value + "px";
});

</script>

</body>
</html>
